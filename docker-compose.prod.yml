version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_PLAYGROUND_API_MODE: backend
        NEXT_PUBLIC_API_BASE_URL: /api/v1
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      DEBUG: "false"
      CORS_ALLOWED_ORIGINS: "http://localhost"
      EXECUTION_BACKEND: local
      EXECUTION_ALLOW_LOCAL_FALLBACK: "true"
      EXECUTION_QUEUE_BACKEND: memory
      RATE_LIMIT_BACKEND: memory
      CACHE_BACKEND: memory
      SECRET_KEY: change-this-before-exposing-publicly
    volumes:
      - backend_runs:/tmp/big-o-playground-runs
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  backend_runs:
