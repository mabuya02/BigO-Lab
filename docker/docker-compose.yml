services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bigo_lab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/bigo_lab
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
      args:
        NEXT_PUBLIC_PLAYGROUND_API_MODE: backend
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ../frontend/.env
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
