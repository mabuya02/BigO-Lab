services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    restart: unless-stopped
    depends_on:
      - redis
    env_file:
      - ../backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
      args:
        NEXT_PUBLIC_PLAYGROUND_API_MODE: backend
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ../frontend/.env
    ports:
      - "3000:3000"

volumes:
  redis_data:
