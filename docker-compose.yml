services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      APP_ENV: production
      DEBUG: "false"
      REDIS_URL: redis://redis:6379/0
      REDIS_REQUIRED: "false"
      EXECUTION_BACKEND: local
      EXECUTION_QUEUE_BACKEND: auto
      EXECUTION_ALLOW_LOCAL_FALLBACK: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      EXPLANATION_PROVIDER: ${EXPLANATION_PROVIDER:-heuristic}
      EXPLANATION_ALLOW_FALLBACK: ${EXPLANATION_ALLOW_FALLBACK:-true}
      OLLAMA_API_BASE_URL: ${OLLAMA_API_BASE_URL:-https://ollama.com/api}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gpt-oss:120b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-20}
      OLLAMA_TEMPERATURE: ${OLLAMA_TEMPERATURE:-0.2}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        NEXT_PUBLIC_PLAYGROUND_API_MODE: backend
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  redis_data:
